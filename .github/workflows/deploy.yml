name: Build & Deploy Node.js Container App

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: choice
        options: [dev, staging, prod]
        default: 'staging'

env:
  APP_NAME: nodejs-app
  ACR_NAME: nodejsappacr
  RESOURCE_GROUP: nodejs-app-rg

jobs:

  # ── Job 1: Deploy Infrastructure ──────────────────────
  infrastructure:
    runs-on: ubuntu-latest
    outputs:
      acr_username: ${{ steps.acr-creds.outputs.acr_username }}
      acr_password: ${{ steps.acr-creds.outputs.acr_password }}
      acr_server: ${{ steps.acr-creds.outputs.acr_server }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep Infrastructure
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./main.bicep
          parameters: >
            appName=${{ env.APP_NAME }}
            acrName=${{ env.ACR_NAME }}

      - name: Get ACR Credentials
        id: acr-creds
        run: |
          ACR_SERVER=$(az acr show \
            --name ${{ env.ACR_NAME }} \
            --query loginServer -o tsv)

          ACR_USERNAME=$(az acr credential show \
            --name ${{ env.ACR_NAME }} \
            --query username -o tsv)

          ACR_PASSWORD=$(az acr credential show \
            --name ${{ env.ACR_NAME }} \
            --query passwords[0].value -o tsv)

          echo "acr_server=$ACR_SERVER" >> $GITHUB_OUTPUT
          echo "acr_username=$ACR_USERNAME" >> $GITHUB_OUTPUT
          echo "acr_password=$ACR_PASSWORD" >> $GITHUB_OUTPUT

  # ── Job 2: Build & Push & Deploy ──────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: infrastructure

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ needs.infrastructure.outputs.acr_server }}
          username: ${{ needs.infrastructure.outputs.acr_username }}
          password: ${{ needs.infrastructure.outputs.acr_password }}

      - name: Build & Push Docker Image
        run: |
          docker build -t ${{ needs.infrastructure.outputs.acr_server }}/${{ env.APP_NAME }}:${{ github.sha }} .
          docker push ${{ needs.infrastructure.outputs.acr_server }}/${{ env.APP_NAME }}:${{ github.sha }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }}-container \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ needs.infrastructure.outputs.acr_server }}/${{ env.APP_NAME }}:${{ github.sha }}

      - name: Get App URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.APP_NAME }}-container \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "🚀 App is live at: https://$URL"
