name: Build & Deploy Node.js Container App

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: choice
        options: [dev, staging, prod]
        default: staging

env:
  APP_NAME: nodejs-app
  ACR_NAME: nodejsappacr
  RESOURCE_GROUP: nodejs-app-rg
  IDENTITY_NAME: nodejs-uami
  LOCATION: centralindia

jobs:

  infrastructure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create User Assigned Identity
        run: |
          chmod +x create-identity.sh
          ./create-identity.sh \
            ${{ env.RESOURCE_GROUP }} \
            ${{ env.LOCATION }} \
            ${{ env.IDENTITY_NAME }} \
            ${{ env.ACR_NAME }}

      # - name: Deploy Infrastructure
      #   uses: azure/arm-deploy@v2
      #   with:
      #     subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      #     resourceGroupName: ${{ env.RESOURCE_GROUP }}
      #     template: ./main.bicep
      #     parameters: >
      #       appName=${{ env.APP_NAME }}
      #       acrName=${{ env.ACR_NAME }}
      #       userAssignedIdentityName=${{ env.IDENTITY_NAME }}
      #     additionalArguments: --debug --verbose
      - name: Deploy Infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file main.bicep \
            --parameters \
              appName=${{ env.APP_NAME }} \
              acrName=${{ env.ACR_NAME }} \
              userAssignedIdentityName=${{ env.IDENTITY_NAME }} \
            --debug \
            --verbose

  deploy:
    runs-on: ubuntu-latest
    needs: infrastructure

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push \
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ github.sha }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }}-container \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.APP_NAME }}:${{ github.sha }}

      - name: Get App URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.APP_NAME }}-container \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)

          echo "App URL: https://$URL"
